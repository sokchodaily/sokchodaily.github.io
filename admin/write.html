<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>속초일보 기사 작성</title>
    
    <!-- 속초바다 글꼴 로딩 -->
    <style>
        @font-face {
            font-family: 'SokchoBadaDotum';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2402_1@1.0/SokchoBadaDotum.woff2') format('woff2');
        }
        @font-face {
            font-family: 'SokchoBadaBatang';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2402_1@1.0/SokchoBadaBatang.woff2') format('woff2');
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        
        .editor-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .editor-header {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .editor-header h1 {
            font-family: 'SokchoBadaDotum', sans-serif;
            margin: 0;
            font-size: 2rem;
        }
        
        .editor-form {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            font-family: 'SokchoBadaBatang', sans-serif;
            font-weight: bold;
            margin-bottom: 8px;
            color: #1e40af;
        }
        
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .title-input {
            font-family: 'SokchoBadaBatang', sans-serif;
            font-size: 18px;
            font-weight: bold;
        }
        
        .content-textarea {
            min-height: 400px;
            resize: vertical;
            line-height: 1.6;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .category-select {
            font-family: 'SokchoBadaBatang', sans-serif;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-family: 'SokchoBadaBatang', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.4);
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .preview-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .preview-article {
            background: white;
            padding: 30px;
            border-radius: 8px;
        }
        
        .preview-title {
            font-family: 'SokchoBadaBatang', sans-serif;
            font-size: 1.8rem;
            color: #1e40af;
            margin-bottom: 15px;
        }
        
        .preview-meta {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .preview-content {
            line-height: 1.8;
            color: #374151;
        }
        
        .output-area {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }
        
        .image-upload-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .image-preview {
            margin-top: 15px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            display: none;
        }
        
        .image-preview.active {
            display: block;
        }
        
        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .image-info {
            margin-top: 10px;
            font-size: 12px;
            color: #64748b;
        }
        
        .remove-image {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .upload-progress {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }
        
        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .helper-text {
            color: #64748b;
            font-size: 12px;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="editor-header">
            <h1>🖊️ 속초일보 기사 작성</h1>
            <p>네이버 블로그처럼 쉽게 기사를 작성하세요!</p>
        </div>
        
        <div class="editor-form">
            <form id="articleForm">
                <div class="form-group">
                    <label for="title">📰 기사 제목</label>
                    <input type="text" id="title" class="title-input" placeholder="예) 속초시 2024년 예산안 확정... 관광개발에 78억원 투입" required>
                    <div class="helper-text">클릭을 유도하는 매력적인 제목을 작성해주세요</div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">📂 카테고리</label>
                        <select id="category" class="category-select" required>
                            <option value="">카테고리 선택</option>
                            <option value="속보">🚨 속보</option>
                            <option value="정치">🏛️ 정치</option>
                            <option value="경제">💼 경제</option>
                            <option value="사회">🏘️ 사회</option>
                            <option value="문화">🎭 문화</option>
                            <option value="관광">🌊 관광</option>
                            <option value="스포츠">⚽ 스포츠</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="author">✍️ 기자명</label>
                        <input type="text" id="author" placeholder="예) 김기자" value="김도엽" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="excerpt">📝 기사 요약 (한 줄)</label>
                    <input type="text" id="excerpt" placeholder="예) 속초시가 내년도 예산을 총 580억원 규모로 확정했다고 발표했습니다.">
                    <div class="helper-text">소셜미디어 공유시 표시될 요약문입니다</div>
                </div>
                
                <div class="form-group">
                    <label for="image">🖼️ 대표 이미지</label>
                    <div class="image-upload-container">
                        <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        <button type="button" class="btn btn-secondary" onclick="document.getElementById('imageFile').click()">
                            📁 컴퓨터에서 이미지 선택
                        </button>
                        <input type="text" id="image" placeholder="또는 이미지 URL을 직접 입력하세요" style="margin-top: 10px;">
                    </div>
                    <div id="imagePreview" class="image-preview"></div>
                    <div class="helper-text">JPG, PNG, GIF 파일을 선택하거나 URL을 입력하세요</div>
                </div>
                
                <div class="form-group">
                    <label for="content">📄 기사 내용</label>
                    <textarea id="content" class="content-textarea" placeholder="기사 내용을 작성해주세요...

예시:
속초시가 내년도 예산을 총 580억원 규모로 확정했다고 12일 발표했습니다.

이번 예산안에서 가장 주목할 점은 관광인프라 개발에 78억원을 집중 투입하기로 결정한 것입니다.

## 주요 예산 배정 내역

- 관광개발: 78억원  
- 도로정비: 45억원
- 복지정책: 32억원

속초시 관계자는 '관광도시 속초의 경쟁력 강화를 위해 대규모 투자를 결정했다'고 밝혔습니다." required></textarea>
                    <div class="helper-text">마크다운 문법을 사용할 수 있습니다. ## 제목, **굵게**, *기울임*, - 목록 등</div>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="previewArticle()">👀 미리보기</button>
                    <button type="button" class="btn btn-primary" onclick="generateMarkdown()">📄 마크다운 생성</button>
                    <button type="button" class="btn btn-success" onclick="copyToClipboard()">📋 복사하기</button>
                </div>
            </form>
            
            <!-- 미리보기 영역 -->
            <div id="previewArea" class="preview-area">
                <h3>📖 미리보기</h3>
                <div class="preview-article">
                    <div id="previewTitle" class="preview-title"></div>
                    <div id="previewMeta" class="preview-meta"></div>
                    <div id="previewContent" class="preview-content"></div>
                </div>
            </div>
            
            <!-- 마크다운 출력 영역 -->
            <div id="outputArea" class="output-area">
                <button class="copy-button" onclick="copyToClipboard()">📋 전체 복사</button>
                <pre id="markdownOutput"></pre>
            </div>
        </div>
    </div>

    <script>
        let currentImageBase64 = '';
        
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 파일 크기 체크 (5MB 제한)
            if (file.size > 5 * 1024 * 1024) {
                alert('이미지 크기는 5MB 이하여야 합니다.');
                return;
            }
            
            // 이미지 파일 체크
            if (!file.type.startsWith('image/')) {
                alert('이미지 파일만 업로드 가능합니다.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                showImagePreview(file, e.target.result);
                // URL 입력 칸에 base64 데이터 입력
                document.getElementById('image').value = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function showImagePreview(file, base64Data) {
            const previewDiv = document.getElementById('imagePreview');
            const fileSize = (file.size / 1024 / 1024).toFixed(2);
            
            previewDiv.innerHTML = `
                <img src="${base64Data}" alt="미리보기">
                <div class="image-info">
                    📁 파일명: ${file.name}<br>
                    📊 크기: ${fileSize}MB<br>
                    📐 형식: ${file.type}
                </div>
                <button type="button" class="remove-image" onclick="removeImage()">
                    🗑️ 이미지 제거
                </button>
            `;
            previewDiv.classList.add('active');
        }
        
        function removeImage() {
            document.getElementById('imagePreview').classList.remove('active');
            document.getElementById('image').value = '';
            document.getElementById('imageFile').value = '';
            currentImageBase64 = '';
        }
        
        // 드래그 앤 드롭 기능
        function setupDragDrop() {
            const imageContainer = document.querySelector('.image-upload-container');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                imageContainer.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });
            
            ['dragenter', 'dragover'].forEach(eventName => {
                imageContainer.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                imageContainer.addEventListener(eventName, unhighlight, false);
            });
            
            imageContainer.addEventListener('drop', handleDrop, false);
        }
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        function highlight(e) {
            e.target.closest('.image-upload-container').classList.add('dragover');
        }
        
        function unhighlight(e) {
            e.target.closest('.image-upload-container').classList.remove('dragover');
        }
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                const file = files[0];
                // 파일 입력 요소에 설정
                const input = document.getElementById('imageFile');
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                input.files = dataTransfer.files;
                
                // 이미지 처리
                handleImageUpload({ target: { files: [file] } });
            }
        }
        
        function previewArticle() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;
            const image = document.getElementById('image').value;
            
            if (!title || !content) {
                alert('제목과 내용을 입력해주세요!');
                return;
            }
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('ko-KR');
            
            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewMeta').innerHTML = `
                <span>📂 ${category}</span> | 
                <span>✍️ ${author}</span> | 
                <span>📅 ${dateStr}</span>
            `;
            
            let contentHtml = content.replace(/\n/g, '<br>');
            if (image) {
                contentHtml = `<img src="${image}" alt="${title}" style="max-width: 100%; height: auto; margin-bottom: 20px; border-radius: 8px;"><br>` + contentHtml;
            }
            
            document.getElementById('previewContent').innerHTML = contentHtml;
            document.getElementById('previewArea').style.display = 'block';
        }
        
        function generateMarkdown() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const author = document.getElementById('author').value;
            const excerpt = document.getElementById('excerpt').value;
            const image = document.getElementById('image').value;
            const content = document.getElementById('content').value;
            
            if (!title || !content || !category || !author) {
                alert('필수 항목을 모두 입력해주세요!');
                return;
            }
            
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const fileName = `${dateStr}-${title.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-가-힣]/g, '')}.md`;
            
            // 이미지가 base64인 경우 안내 추가
            let imageNote = '';
            if (image && image.startsWith('data:image/')) {
                imageNote = `\n\n<!-- 이미지 업로드 안내 -->\n<!-- 1. GitHub 저장소의 images 폴더에 이미지 파일을 먼저 업로드하세요 -->\n<!-- 2. 업로드된 이미지의 URL로 image 값을 변경하세요 -->\n<!-- 예: /assets/images/2024-06-12-news-image.jpg -->`;
            }
            
            const markdown = `---
layout: post
title: "${title}"
date: ${now.toISOString().split('.')[0]}+09:00
categories: ${category}
author: ${author}${image ? `\nimage: ${image.startsWith('data:image/') ? '/assets/images/업로드된-이미지-파일명.jpg' : image}` : ''}${excerpt ? `\nexcerpt: "${excerpt}"` : ''}
---
${image && image.startsWith('data:image/') ? '\n![' + title + '](/assets/images/업로드된-이미지-파일명.jpg)\n' : ''}
${content}${imageNote}`;
            
            document.getElementById('markdownOutput').textContent = `파일명: _posts/${fileName}\n\n${markdown}`;
            document.getElementById('outputArea').style.display = 'block';
            
            // 이미지 업로드 안내
            if (image && image.startsWith('data:image/')) {
                alert('📋 이미지 업로드 안내:\n\n1. 먼저 GitHub 저장소에 images 폴더를 만드세요\n2. 선택하신 이미지 파일을 업로드하세요\n3. 업로드된 이미지 경로로 마크다운을 수정하세요\n\n마크다운에 안내 주석을 추가했습니다.');
            }
            
            // 스크롤을 출력 영역으로 이동
            document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });
        }
        
        function copyToClipboard() {
            const output = document.getElementById('markdownOutput').textContent;
            if (!output) {
                alert('먼저 마크다운을 생성해주세요!');
                return;
            }
            
            navigator.clipboard.writeText(output.split('\n\n')[1]).then(() => {
                alert('📋 마크다운이 클립보드에 복사되었습니다!\nGitHub에서 새 파일을 만들고 붙여넣기 하세요.');
            });
        }
        
        // 페이지 로드시 드래그 앤 드롭 설정
        document.addEventListener('DOMContentLoaded', function() {
            setupDragDrop();
        });
        
        // 실시간 미리보기 (옵션)
        document.getElementById('title').addEventListener('input', function() {
            if (document.getElementById('previewArea').style.display === 'block') {
                previewArticle();
            }
        });
    </script>
</body>
</html>
